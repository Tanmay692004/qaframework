[pytest]
# pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Additional options
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no

# Custom markers
markers =
    login: Login related tests
    cart: Cart related tests
    product: Product related tests
    checkout: Checkout related tests
    smoke: Smoke tests
