name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
        python-version: [3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output folders
        run: |
          mkdir -p reports
          mkdir -p screenshots

      - name: Run tests (browser=${{ matrix.browser }})
        run: |
          python -m pytest -n 2 -q --browser=${{ matrix.browser }} --html=reports/report-${{ matrix.browser }}.html --self-contained-html --junitxml=reports/junit-${{ matrix.browser }}.xml

      - name: Upload reports and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts-${{ matrix.browser }}
          path: |
            reports/report-${{ matrix.browser }}.html
            reports/junit-${{ matrix.browser }}.xml
            screenshots/
